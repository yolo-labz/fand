# fand pre-merge CI gates.
#
# Runner: macos-latest (Apple Silicon). fand is Apple-Silicon-only.
#
# SECURITY NOTE: no job uses untrusted event payloads in run: contexts.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-test:
    name: build + test
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        run: rustup show

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo build --release --locked
      - run: cargo test --lib --locked
      - run: cargo test --bin fand --locked

      - name: proptest quick run
        env:
          PROPTEST_CASES: "256"
        run: cargo test --test 'proptest_*' --locked

      - name: trybuild compile-fail tests
        run: cargo test --test compile_fail --locked

      - name: Binary size budget (700 KiB)
        run: |
          size=$(stat -f%z target/release/fand 2>/dev/null || stat -c%s target/release/fand)
          echo "binary size: ${size} bytes"
          if [ "$size" -gt 716800 ]; then
            echo "::error::binary exceeds 700 KiB (${size} bytes)"
            exit 1
          fi

  clippy:
    name: clippy
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy
      - run: cargo clippy --all-targets --locked -- -D warnings

  rustfmt:
    name: rustfmt
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --check

  nix-build:
    name: nix build
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - run: nix flake check
      - run: nix build .#fand
      - run: result/bin/fand version
      - run: codesign --verify --verbose result/bin/fand

  nix-eval:
    name: nix eval module
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Eval darwin module
        run: |
          nix eval .#darwinModules.default --apply 'mod: builtins.typeOf mod'
