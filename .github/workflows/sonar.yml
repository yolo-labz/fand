# TODO: Provision SonarQube project on sonarqube.home301server.com.br:
#   1. Create project: yolo-labz_fand
#   2. Generate PROJECT_ANALYSIS_TOKEN (scoped to this project key)
#   3. Set repo variable SONAR_HOST_URL = https://sonarqube.home301server.com.br
#   4. Set repo secret SONAR_TOKEN = <the project analysis token>
#
# NOTE: fand's test suite is macOS-only (IOKit/SMC). This workflow runs on
# ubuntu-latest and performs Sonar's intrinsic Rust static analysis only;
# no coverage upload. Adding cargo-llvm-cov would require a macOS job that
# uploads lcov.info as an artifact — deferred until needed.
#
# SECURITY NOTE: no untrusted event payloads used in run: contexts.

name: SonarQube scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions: {}

jobs:
  scan:
    name: SonarQube scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout (full history for blame-based coverage)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Skip if SonarQube not configured
        id: check
        env:
          HOST: ${{ vars.SONAR_HOST_URL }}
          TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$HOST" ] || [ -z "$TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SONAR_HOST_URL or SONAR_TOKEN not set — skipping Sonar scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: SonarQube scan
        if: steps.check.outputs.skip == 'false'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
