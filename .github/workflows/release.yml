# fand release workflow — FR-022..025, FR-032, FR-044..047.
#
# Triggered on git tags matching v*. Builds the binary via nix,
# creates a GitHub Release with the binary artifact, SHA-256,
# and SLSA provenance attestation.
#
# SECURITY NOTE: no job uses untrusted event payloads in run: contexts.
# The only github.* reference is github.ref_name in the release body
# template, which GitHub validates against a safe tag-name character set.

name: release

on:
  push:
    tags: ['v*']

permissions: {}

jobs:
  release:
    name: build and release
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Build fand via nix
        run: nix build .#fand

      - name: Extract binary and compute SHA-256
        run: |
          cp result/bin/fand ./fand-aarch64-darwin
          sha=$(sha256sum ./fand-aarch64-darwin | awk '{print $1}')
          echo "SHA256=${sha}" >> "$GITHUB_ENV"

      - name: Verify codesign
        run: codesign --verify --verbose ./fand-aarch64-darwin

      - name: Check binary runs
        run: ./fand-aarch64-darwin version

      # FR-046 — dual-format SBOM (CycloneDX + SPDX) emitted by syft.
      # Anchore sbom-action auto-uploads each generated file as a release
      # asset (upload-release-assets defaults to true). Both runs scan the
      # same release binary so the SBOMs describe what users actually
      # download; the binary-graph view catches transitive crates that the
      # source-tree view would miss after dead-code elimination.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: ./fand-aarch64-darwin
          format: cyclonedx-json
          output-file: fand-aarch64-darwin.cdx.json
          artifact-name: fand-sbom-cyclonedx

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: ./fand-aarch64-darwin
          format: spdx-json
          output-file: fand-aarch64-darwin.spdx.json
          artifact-name: fand-sbom-spdx

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ./fand-aarch64-darwin

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          files: ./fand-aarch64-darwin
          body: |
            ## fand ${{ github.ref_name }}

            **SHA-256**: `${{ env.SHA256 }}`
            **Codesign**: valid (ad-hoc via stdenv sigtool)
            **Platform**: aarch64-darwin (Apple Silicon macOS 14+)

            ### Install via Nix
            ```
            nix build github:yolo-labz/fand/${{ github.ref_name }}
            ```

            ### Verify provenance
            ```
            gh attestation verify ./fand-aarch64-darwin --owner yolo-labz
            ```

            ### SBOM (dual-format)
            CycloneDX 1.x JSON: `fand-aarch64-darwin.cdx.json`
            SPDX 2.x JSON: `fand-aarch64-darwin.spdx.json`
