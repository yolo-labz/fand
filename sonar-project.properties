sonar.projectKey=yolo-labz_fand
sonar.projectName=fand
sonar.organization=yolo-labz

# Source roots
sonar.sources=src,build.rs
sonar.tests=tests,benches

# Rust community plugin — emits lcov path only when cargo-llvm-cov runs in CI.
# fand's test suite is macOS-only (IOKit/SMC); Sonar runs on ubuntu so we
# rely on intrinsic Rust analysis rather than coverage upload. If a macOS
# coverage job is added later, uncomment:
# sonar.community.rust.lcov.reportPaths=lcov.info

# Scanner hygiene
sonar.sourceEncoding=UTF-8
sonar.exclusions=target/**,result/**,nix/**,supply-chain/**,docs/**,tests/fixtures/**
