<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="fand-hero-title fand-hero-desc">
  <title id="fand-hero-title">fand: Apple Silicon fan control daemon</title>
  <desc id="fand-hero-desc">Catppuccin Mocha card. Left panel shows the wordmark fand in mauve over a monospaced tagline. Right panel shows a fan rotor with five blades over a temperature gradient ramp from peach to blue, plus an Apple silhouette anchoring the lower-right corner.</desc>
  <rect width="1200" height="360" fill="#1e1e2e"/>
  <rect x="0" y="0" width="1200" height="3" fill="#cba6f7"/>
  <g font-family="ui-serif,Georgia,'Iowan Old Style','Apple Garamond',serif" fill="#cdd6f4">
    <text x="72" y="170" font-size="120" font-weight="700" letter-spacing="-4">fand</text>
  </g>
  <g font-family="ui-monospace,'JetBrains Mono','Fira Code',Menlo,monospace" fill="#a6adc8">
    <text x="76" y="218" font-size="20">temperature-driven fan curves</text>
    <text x="76" y="246" font-size="20">for apple silicon macbooks</text>
  </g>
  <g font-family="ui-monospace,'JetBrains Mono','Fira Code',Menlo,monospace" fill="#6c7086">
    <text x="76" y="296" font-size="14">nix run github:yolo-labz/fand</text>
  </g>
  <g transform="translate(720,60)">
